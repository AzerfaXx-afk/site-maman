<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Metallic Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5C77D"/>
      <stop offset="25%" stop-color="#BF953F"/>
      <stop offset="45%" stop-color="#FCF6BA"/>
      <stop offset="70%" stop-color="#B38728"/>
      <stop offset="100%" stop-color="#735212"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Outer ring, open at the bottom left -->
    <path d="M 22 76 A 40 40 0 1 1 80 75" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- The central orb -->
    <circle cx="50" cy="40" r="14" fill="url(#gold)"/>
    
    <!-- The stylized hand cradling the orb -->
    <path d="M 12 65
             C 25 90, 65 92, 86 65
             C 70 82, 55 83, 45 74
             C 35 65, 25 63, 12 65 Z" fill="url(#gold)"/>
  </g>
</svg>
